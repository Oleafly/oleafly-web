name: PR checks

on:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Lighthouse audit (performance, accessibility, best practices, SEO)
        run: npx --yes @lhci/cli@0.14.x autorun --config=.lighthouserc.json
